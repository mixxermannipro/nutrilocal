name: nutrilocal
description: "NutriLocal - Lokale, private KI-Kalorien- & Ernährungstracking-App mit BYOK & Workout-Tagebuch."
publish_to: 'none'
version: 1.0.12+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  mobile_scanner: ^5.1.1
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  http: ^1.2.1
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
