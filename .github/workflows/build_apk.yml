name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.12.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.12.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.12
          name: "NutriLocal v1.0.12 (Refactored Meal Logging, AI Model Cleaning & Coach Chat Fix)"
          body: |
            ## NutriLocal v1.0.12 Release 🎉
            
            ### Fixes & End-to-End Improvements:
            - **Mahlzeit-Erfassung Gefixt**: `Navigator.pushReplacement` im Logging-Sheet korrigiert. Mahlzeiten lassen sich nun per Foto, Text, Barcode oder Manuell nahtlos erfassen & speichern.
            - **BYOK Modellerkennung Gefixt**: Gemini, OpenAI & Groq Model-IDs werden vor API-Aufrufen bereinigt (verhindert 404-Fehler).
            - **AI Coach Chat Überarbeitet**: Echtes Auto-Scrolling zum Ende der Konversation, hübschere Sprechblasen im Apple-Design & verbesserte Prompt-Chips.
            - **In-App Auto Updater**: Meldet Version v1.0.12 automatisch in der App.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.12.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
