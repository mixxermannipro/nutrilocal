name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.11.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.11.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.11
          name: "NutriLocal v1.0.11 (In-App Auto Updater & F-Droid Open Source Ready)"
          body: |
            ## NutriLocal v1.0.11 Release 🎉
            
            ### In-App Auto Updater & In-Place Upgrades:
            - **In-App Auto-Updater**: Die App prüft beim Start automatisch auf GitHub Releases. Wenn eine neuere Version verfügbar ist, erscheint direkt ein Update-Banner in der App mit 1-Klick Installation.
            - **Kein manueller Download mehr**: Künftige Versionen werden direkt in der App angezeigt und aktualisiert.
            - **13 BYOK LLM Provider & 6 Speech-to-Text Engines** 1 zu 1 aus Fud AI integriert.
            - **Progressive Overload Workout Tracker & Health Connect Sync**.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.11.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
