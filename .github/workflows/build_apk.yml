name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.6.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.6.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.6
          name: "NutriLocal v1.0.6 Release (Clean State, No Water, Health Connect)"
          body: |
            ## NutriLocal v1.0.6 Release 🎉
            
            ### Highlights & User Feedback Enhancements:
            - **Keine Hardcoded-Mahlzeiten / Reiner Neuzustand**: Alle Demo-Daten entfernt. "Alle Daten löschen" setzt die App nun zu 100% sauber zurück.
            - **Wassertracking entfernt**: Wie gewünscht vollständig aus Dashboard, App & Repository entfernt.
            - **Mahlzeit erfassen Button gefixt**: Reibungsloser Aufruf des Logging-Sheets mit Multi-Foto, Notizen, Barcode & Manuell.
            - **Intuitiveres Workout-Tagebuch**: Neues erfassen von Muskelgruppen, Übungen, Sätzen, Reps & RPE mit Wischen-zum-Löschen.
            - **Health Connect Schalter**: Optionale Synchronisierung in den Einstellungen steuerbar.
            - **Fud AI Benchmark Architecture**: BYOK Multi-Provider KI, What-If Impaktschätzung, Thermodynamischer AI Coach Chat.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.6.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
