name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.8.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.8.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.8
          name: "NutriLocal v1.0.8 Release (Full Fud AI German Architecture & Progressive Overload)"
          body: |
            ## NutriLocal v1.0.8 Release 🎉
            
            ### Vollständige Fud AI Architektur & Deutsche Optimierungen:
            - **100% Deutsche Sprachführung**: Alle UIs, Prompt-Ketten und Dialoge vollständig auf Deutsch (DACH).
            - **Intelligente Eingabemethoden**: Kamera-Scan (1-10 Fotos), Galerie-Import, Barcode-Scan mit Open Food Facts DACH, Texteingabe, Stimmeingabe & Manuell.
            - **Favoriten, Zuletzt verwendet & Gestern kopieren**: Schnell-Logg-Leiste und 1-Klick Kopie vergangener Tage.
            - **Fud AI Fortschritts-Tracker**: Gewicht & Körperfett % mit 7d EMA Glättung & Android Health Connect Integration.
            - **Minimalistisches Progressive Overload Workout Tagebuch**: Zeigt bei der Übungsauswahl automatisch das letzte Ergebnis (*z.B. "Letztes Mal: 6 WDH @ +10kg Zusatzgewicht"*)!
            - **Thermodynamischer AI Coach Chat**: 30/60/90 Tage Gewichtsprognose mit Under-Logging Erkennung.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.8.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
