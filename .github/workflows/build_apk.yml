name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.7.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.7.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.7
          name: "NutriLocal v1.0.7 Release (Fud AI Core Integration & Clean Build)"
          body: |
            ## NutriLocal v1.0.7 Release 🎉
            
            ### Fud AI Deep Integration & Improvements:
            - **Fud AI Codebase Integration**: Kompletter Fud AI Quellcode aus GitHub extrahiert und in den Ordner `fud-ai` integriert.
            - **Thermodynamische Gewichtsprognose**: `WeightAnalysisService` aus Fud AI integriert (30/60/90 Tage Prognose & EMA Trend).
            - **100% Saubere Daten**: Keine Testdaten mehr, vollständiger Reset aller Daten.
            - **Wassertracking entfernt**: Wie gewünscht komplett entfernt.
            - **Minimalistisches Apple-Design**: Squircle Rosé/Emerald Gradient Icon.
            - **BYOK Multi-Provider KI**: Gemini, OpenRouter, OpenAI, Groq, Ollama + Fallback Provider Chain.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.7.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
