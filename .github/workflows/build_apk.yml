name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.1.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.1.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.1
          name: "NutriLocal v1.0.1 Release"
          body: |
            ## NutriLocal v1.0.1 Release 🎉
            
            ### Fixes & Enhancements:
            - **Behobener Gradle Build Fehler**: `flutter.sdk` & AndroidX Konfiguration korrigiert.
            - **100% Lokal & Privat**: Keine Cloud, kein Nutzerkonto, keine Werbung.
            - **BYOK (Bring Your Own Key)**: KI-Analyse mit Google Gemini, OpenRouter, OpenAI, Groq, Ollama + Fallback Provider Chain.
            - **Multi-Fotoanalyse**: Bis zu 10 Fotos gleichzeitig + Notiz erfassen.
            - **Review-Screen mit "What-If" Impakt**: Vorschau auf verbleibende Tages-Restkalorien VOR dem Speichern.
            - **AI Coach Chat**: Lokaler KI-Berater mit thermodynamischer 30/60/90-Tage Gewichtsprognose.
            - **Wassertracking**: Tagesziel & Quick-Log.
            - **Workout-Tagebuch**: Krafttraining loggen mit Sätzen, Reps & Kalorienverbrauch.
            - **Barcode-Scan**: Open Food Facts Integration für verpackte Produkte.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.1.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
