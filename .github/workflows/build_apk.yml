name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.10.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.10.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.10
          name: "NutriLocal v1.0.10 (1:1 Fud AI 13 BYOK & 6 STT Providers)"
          body: |
            ## NutriLocal v1.0.10 Release 🎉
            
            ### 1:1 Fud AI BYOK & STT Provider Integration:
            - **13 BYOK LLM Provider**: Google Gemini (3.5 Flash-Lite / 3.6 / 3.5), OpenAI (GPT-5.4 Mini / 5.5 / 5.4 Nano / 4o), Anthropic Claude (Sonnet 5 / Opus 4.8 / Haiku 4.5), xAI Grok (Grok 4.3), OpenRouter, Together AI, Groq, Hugging Face, Fireworks AI, DeepInfra, Mistral, Ollama (Local), Custom OpenAI-compatible.
            - **6 Speech-to-Text Provider**: Native iOS / Android (On-Device), Gemini Audio, OpenAI Whisper, Groq Whisper (whisper-large-v3), Deepgram (Nova-3), AssemblyAI.
            - **1:1 Datenfluss-Diagramm & Dokumentation**: Vollständig in der deutschen `README.md` integriert.
            - **Progressive Overload Workout Tracker & Health Connect Sync**.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.10.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
