name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.9.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.9.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.9
          name: "NutriLocal v1.0.9 Final Release (Latest LLM Models, Clean Architecture & Documentation)"
          body: |
            ## NutriLocal v1.0.9 Final Release 🎉
            
            ### Highlights dieser Version:
            - **Dynamische KI-Modellauswahl (Gemini 2.0 Flash, GPT-4o, etc.)**: In den Einstellungen wählbar für primären & Fallback-Provider.
            - **Sauberes Repository**: Temporäre Dateien bereinigt, professionelles `README.md` hinzugefügt.
            - **Vollständige Fud AI Integration & Lokalisierung**: 100% Deutsch, Multi-Foto, Barcode, Voice, Copy-from-Yesterday.
            - **Progressive Overload Workout Tagebuch**: Automatische Anzeige des letzten Ergebnisses beim Übungseintrag.
            - **Thermodynamischer AI Coach & Health Connect Sync**.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.9.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
