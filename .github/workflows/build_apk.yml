name: Build Android APK & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Unit Tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk NutriLocal-v1.0.13.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NutriLocal-APK
          path: NutriLocal-v1.0.13.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.13
          name: "NutriLocal v1.0.13 (Production Architecture & SQLite Persistence)"
          body: |
            ## NutriLocal v1.0.13 Release 🎉
            
            ### Produktions- & Architektur-Upgrade:
            - **Echte SQLite-Persistenz**: Alle Mahlzeiten, Workouts, Gewichtseinträge & Nutzerprofile werden dauerhaft in einer nativen SQLite-Datenbank auf dem Smartphone gespeichert.
            - **Secure Storage für BYOK-Keys**: API-Keys werden ausschließlich im verschlüsselten Android Keystore / Secure Storage aufbewahrt (niemals in der Datenbank oder im JSON-Export).
            - **Echtes Onboarding & Zielberechnung**: Onboarding-Flow beim Erststart mit Mifflin-St. Jeor Formeln.
            - **Unit Tests im CI Pipeline**: Ausführung von Tests für Nährwertrechner, Thermodynamik & KI-Parser vor dem Release-Build.
            - **Bereinigtes Repository & Lizenzen**: Fremd-Referenzcode nach `reference/` verschoben mit vollständigen Lizenzen & ATTRIBUTION.md.
            
            Download der `.apk` Datei unten! 👇
          files: NutriLocal-v1.0.13.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
